version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: freelance_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: freelance
      POSTGRES_PASSWORD: freelance123
      POSTGRES_DB: freelance_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelance -d freelance_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: freelance_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://freelance:freelance123@db:5432/freelance_tracker
    ports:
      - "8000:8000"
    volumes:
      - ./frontend:/app/frontend:ro

volumes:
  pgdata:
